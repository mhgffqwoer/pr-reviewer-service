version: "2"

run:
  timeout: 5m
  tests: true
  concurrency: 8

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - goconst
    - prealloc
    - gosec
    - bodyclose
    - sqlclosecheck
    - gocyclo
    - gocognit
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentFormatting
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 2
      min-occurrences: 2
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
