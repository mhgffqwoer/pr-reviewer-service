name: CI Pipeline

on: [push, pull_request]

jobs:
  golangci-lint:
    name: Run golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  build:
    name: Build project
    runs-on: ubuntu-latest
    needs: golangci-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build project
        run: go build ./...

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pr_service_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop pre-installed PostgreSQL
        run: sudo systemctl stop postgresql

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run unit tests
        run: go test -tags=unit -v ./internal/...

      - name: Run integration tests
        run: |
          docker compose -f deployment/docker-compose.test.yaml up -d
          docker compose -f deployment/docker-compose.test.yaml down -v
          go test -tags=integration -v ./tests/...

      - name: Cleanup
        if: always()
        run: |
          docker compose -f deployment/docker-compose.test.yaml down -v
