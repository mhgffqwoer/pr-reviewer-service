services:
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: pr_service_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d pr_service_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ../migrations/:/migrations
    command:
      [
        "-path",
        "/migrations/",
        "-database",
        "postgres://testuser:testpass@test-db:5432/pr_service_test?sslmode=disable",
        "up",
      ]
